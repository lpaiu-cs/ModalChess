seed: 11
output_dir: outputs/week2/exp2_action_pair/seed11
model_config_paths:
  - configs/model/board_encoder.yaml
  - configs/model/heads.yaml
train_dataset:
  source: jsonl
  dataset_path: data/pilot/real_v1/supervised_train.jsonl
  split: all
  history_length: 1
val_dataset:
  source: jsonl
  dataset_path: data/pilot/real_v1/supervised_val.jsonl
  split: all
  history_length: 1
model:
  use_pair_scorer: true
train:
  batch_size: 128
  eval_batch_size: 256
  epochs: 2
  learning_rate: 0.0005
  weight_decay: 0.01
  grad_clip_norm: 1.0
  run_overfit: false
  overfit_steps: 0
metrics:
  topk: [1, 3, 5]
losses:
  policy: 1.0
  policy_axis_ce: 1.0
  policy_listwise: 1.0
  state_probe: 1.0
  legality: 0.25
  legality_pos_weight_cap: 64.0
  value: 0.1
  concept: 0.1
